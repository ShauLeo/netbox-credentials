{% extends 'generic/object.html' %}

{% block content %}
<div class="row mb-3">
    <div class="col col-md-6">
        <div class="card">
            <h5 class="card-header">Assignment Details</h5>
            <table class="table table-hover attr-table">
                <tr>
                    <th scope="row">Credential</th>
                    <td><a href="{{ object.credential.get_absolute_url }}">{{ object.credential }}</a></td>
                </tr>
                <tr>
                    <th scope="row">Device</th>
                    <td><a href="{{ object.device.get_absolute_url }}">{{ object.device }}</a></td>
                </tr>
                <tr>
                    <th scope="row">Role</th>
                    <td>{{ object.role|default:"—" }}</td>
                </tr>
            </table>
        </div>
    </div>
    <div class="col col-md-6">
        {% include 'inc/panels/tags.html' %}
    </div>
</div>
{% endblock content %}
